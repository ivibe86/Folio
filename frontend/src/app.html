<!doctype html>
<html lang="en" class="">
<head>
    <script>
        var dashboardNow = new Date();
        var dashboardAsOf = [
            dashboardNow.getFullYear(),
            String(dashboardNow.getMonth() + 1).padStart(2, '0'),
            String(dashboardNow.getDate()).padStart(2, '0')
        ].join('-');
        window.__dashboardData = fetch('/api/dashboard-bundle?nw_interval=biweekly&as_of=' + encodeURIComponent(dashboardAsOf), {
            headers: { 'X-API-Key': '%Folio_API_KEY%' }
        })
        .then(function(r) { return r.ok ? r.json() : null; })
        .catch(function() { return null; });
    </script>  
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- FOUC prevention: apply theme class before first paint -->
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme');
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            } catch(e) {}
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 창창 Preload critical font CSS 창창창창창창창창창창창창창창창창창창창창창창창창창창
         Preloading the icon font CSS tells the browser to fetch it
         at highest priority BEFORE parsing the rest of <head>.
         This eliminates the FOUT window where raw icon names
         (dashboard, receipt_long, etc.) flash in the sidebar. -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" as="style" crossorigin />

    <!-- 창창 Text Fonts 창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창창
         Single request: Inter + Newsreader + Manrope + JetBrains Mono + DM Mono
         display=swap: shows fallback text instantly, swaps when loaded -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500..800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- 창창 Icon Font 창 Self-Hosted (zero network latency) 창창창창
         Material Symbols Outlined served from /fonts/ directory.
         Loaded via @font-face in app.css. No external fetch needed. -->

    <title>The Ledger</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
